<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASUSTIMES — 科技產業情報</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-primary:    #090c14;
    --bg-secondary:  #0d1120;
    --bg-card:       #111827;
    --bg-card-hover: #161d30;
    --border:        rgba(255,255,255,0.07);
    --border-hover:  rgba(20,120,255,0.35);
    --text-primary:  #e2e8f4;
    --text-secondary:#8892aa;
    --text-muted:    #4d566e;
    --accent:        #1464f6;
    --accent-2:      #4d8fff;
    --accent-light:  #7eb3ff;
    --glow:          rgba(20,100,246,0.18);
    --glow-card:     rgba(20,100,246,0.08);
  }
  [data-theme="light"] {
    --bg-primary:    #f0f4fb;
    --bg-secondary:  #ffffff;
    --bg-card:       #ffffff;
    --bg-card-hover: #f0f6ff;
    --border:        rgba(0,0,0,0.07);
    --border-hover:  rgba(20,100,246,0.3);
    --text-primary:  #0f172a;
    --text-secondary:#475569;
    --text-muted:    #94a3b8;
    --accent:        #1249c8;
    --accent-2:      #1464f6;
    --accent-light:  #3b82f6;
    --glow:          rgba(20,100,246,0.12);
    --glow-card:     rgba(20,100,246,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

  /* ── Header ── */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(20px);
  }
  .header-inner {
    max-width: 1440px; margin: 0 auto;
    padding: 0 1.5rem; height: 62px;
    display: flex; align-items: center; gap: 1.2rem;
  }

  /* ── Logo ── */
  .logo { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; flex-shrink: 0; }
  .logo-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #0f40c8, #1464f6, #38a3ff);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; font-weight: 800;
    color: white; font-family: 'Inter', sans-serif;
    letter-spacing: -0.05em;
    box-shadow: 0 0 18px var(--glow), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .logo-name {
    font-family: 'Inter', sans-serif;
    font-size: 1.18rem; font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ffffff 30%, var(--accent-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  [data-theme="light"] .logo-name {
    background: linear-gradient(135deg, #0a1f5e, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 0.62rem; color: var(--text-muted);
    letter-spacing: 0.04em; margin-top: -1px;
    font-family: 'Inter', sans-serif;
  }

  /* ── Search ── */
  .search-wrap { flex: 1; max-width: 420px; position: relative; }
  .search-icon {
    position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 0.82rem; pointer-events: none;
  }
  .search-input {
    width: 100%; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 0.5rem 0.85rem 0.5rem 2.3rem;
    font-size: 0.84rem; color: var(--text-primary);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }

  /* Mobile search bar (hidden by default, shown below header) */
  .mobile-search-bar {
    display: none;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
  }
  .mobile-search-bar.open { display: flex; }
  .mobile-search-bar .search-input { max-width: 100%; }

  .header-actions { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
  .btn-icon {
    width: 34px; height: 34px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 0.88rem;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent-2); }

  .refresh-btn {
    display: flex; align-items: center; gap: 0.4rem;
    background: linear-gradient(135deg, #0f40c8, #1464f6);
    color: white; border: none; border-radius: 9px;
    padding: 0.42rem 0.9rem; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    font-family: inherit; letter-spacing: 0.01em;
    box-shadow: 0 2px 10px var(--glow);
  }
  .refresh-btn:hover { opacity: 0.88; }
  .refresh-btn:active { transform: scale(0.97); }
  .refresh-btn.loading { opacity: 0.55; pointer-events: none; }

  /* ── Main ── */
  .main { max-width: 1440px; margin: 0 auto; padding: 1.4rem 1.5rem; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    padding: 0.7rem 1.1rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 1.1rem;
  }
  .stat-item { display: flex; align-items: center; gap: 0.38rem; font-size: 0.76rem; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .stat-label { color: var(--text-muted); }
  .stat-value { color: var(--text-primary); font-weight: 600; }
  .stat-sep { width: 1px; height: 13px; background: var(--border); }
  .last-update { margin-left: auto; font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }

  /* ── Date filter pills ── */
  .date-filters { display: flex; gap: 0.4rem; margin-bottom: 0.7rem; flex-wrap: wrap; align-items: center; }
  .date-label { font-size: 0.72rem; color: var(--text-muted); margin-right: 0.2rem; }
  .date-pill {
    padding: 0.22rem 0.65rem; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-card);
    font-size: 0.72rem; cursor: pointer; transition: all 0.18s;
    color: var(--text-secondary); font-family: inherit; font-weight: 500;
  }
  .date-pill:hover { border-color: var(--accent); color: var(--accent-2); }
  .date-pill.active {
    background: var(--accent); border-color: var(--accent);
    color: white; box-shadow: 0 0 8px var(--glow);
  }

  /* ── Source pills ── */
  .source-filters { display: flex; gap: 0.4rem; margin-bottom: 0.9rem; flex-wrap: wrap; }
  .source-pill {
    padding: 0.27rem 0.75rem; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-card);
    font-size: 0.73rem; cursor: pointer; transition: all 0.18s;
    color: var(--text-secondary); font-family: inherit; font-weight: 500;
  }
  .source-pill:hover { border-color: var(--accent); color: var(--accent-2); }
  .source-pill.active {
    background: var(--accent); border-color: var(--accent);
    color: white; box-shadow: 0 0 10px var(--glow);
  }

  /* ── Category tabs (multi-select) ── */
  .tabs-wrap { margin-bottom: 0.6rem; }
  .tabs {
    display: flex; flex-wrap: wrap; gap: 0.2rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.28rem;
  }
  .tab {
    padding: 0.38rem 0.85rem; border-radius: 8px;
    font-size: 0.8rem; font-weight: 500; cursor: pointer;
    transition: all 0.18s; white-space: nowrap; border: none;
    background: transparent; color: var(--text-secondary); font-family: inherit;
    user-select: none;
  }
  .tab:hover { color: var(--text-primary); background: var(--bg-card-hover); }
  .tab.active { background: var(--accent); color: white; box-shadow: 0 2px 10px var(--glow); }
  .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.14); border-radius: 10px;
    padding: 0 0.38rem; font-size: 0.66rem; margin-left: 0.28rem;
    min-width: 1.3rem; height: 1.3rem; font-weight: 600;
  }
  .multi-hint {
    font-size: 0.68rem; color: var(--text-muted); margin-bottom: 1rem;
    padding-left: 0.3rem;
  }

  /* ── Result bar ── */
  .result-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.8rem; min-height: 1.4rem;
  }
  .result-count { font-size: 0.75rem; color: var(--text-muted); }
  .result-count strong { color: var(--text-secondary); }

  /* ── News grid ── */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(345px, 1fr));
    gap: 1rem;
  }

  /* ── Date separator ── */
  .date-sep {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 0.75rem;
    margin-top: 0.4rem;
  }
  .date-sep::before, .date-sep::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .date-sep-label {
    font-size: 0.7rem; color: var(--text-muted); white-space: nowrap;
    font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.06em;
    background: var(--bg-card); padding: 0.2rem 0.6rem; border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ── News card ── */
  .news-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.1rem 1.15rem;
    display: flex; flex-direction: column; gap: 0.55rem;
    transition: all 0.22s; cursor: pointer; text-decoration: none;
    position: relative; overflow: hidden;
  }
  .news-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), #38a3ff, #60efff);
    opacity: 0; transition: opacity 0.22s;
  }
  .news-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.18), 0 0 0 1px var(--glow-card);
  }
  .news-card:hover::before { opacity: 1; }

  .card-header { display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }

  /* Source badges */
  .source-badge {
    font-size: 0.66rem; font-weight: 700; padding: 0.13rem 0.5rem;
    border-radius: 5px; border: 1px solid; white-space: nowrap;
    letter-spacing: 0.03em; font-family: 'Inter', sans-serif;
  }
  .src-digitimes  { color: #60a5fa; border-color: rgba(96,165,250,0.3);  background: rgba(96,165,250,0.08); }
  .src-ctee       { color: #fbbf24; border-color: rgba(251,191,36,0.3);  background: rgba(251,191,36,0.08); }
  .src-udn        { color: #34d399; border-color: rgba(52,211,153,0.3);  background: rgba(52,211,153,0.08); }
  .src-technews   { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
  .src-ithome     { color: #fb923c; border-color: rgba(251,146,60,0.3);  background: rgba(251,146,60,0.08); }
  .src-toms       { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }
  .src-yahoo      { color: #38bdf8; border-color: rgba(56,189,248,0.3);  background: rgba(56,189,248,0.08); }
  .src-global     { color: #94a3b8; border-color: rgba(148,163,184,0.25); background: rgba(148,163,184,0.07); }

  /* Category tags */
  .cat-tag { font-size: 0.65rem; padding: 0.12rem 0.48rem; border-radius: 5px; font-weight: 600; }
  .cat-ai      { color: #c084fc; background: rgba(192,132,252,0.12); }
  .cat-mem     { color: #60a5fa; background: rgba(96,165,250,0.12);  }
  .cat-semi    { color: #fb923c; background: rgba(251,146,60,0.12);  }
  .cat-pc      { color: #22d3ee; background: rgba(34,211,238,0.12);  }
  .cat-server  { color: #4ade80; background: rgba(74,222,128,0.12);  }
  .cat-panel   { color: #fbbf24; background: rgba(251,191,36,0.12);  }
  .cat-gaming  { color: #f87171; background: rgba(248,113,113,0.12); }
  .cat-supply  { color: #94a3b8; background: rgba(148,163,184,0.12); }
  .cat-fin     { color: #34d399; background: rgba(52,211,153,0.12);  }
  .cat-risk    { color: #f87171; background: rgba(248,113,113,0.12); }

  /* Watchlist risk badges */
  .risk-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 0.63rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.02em; white-space: nowrap;
  }
  .risk-red    { background: rgba(239,68,68,0.18);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .risk-yellow { background: rgba(234,179,8,0.15);  color: #eab308; border: 1px solid rgba(234,179,8,0.3); }

  .card-title {
    font-size: 0.88rem; font-weight: 600; line-height: 1.5;
    color: var(--text-primary);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-summary {
    font-size: 0.76rem; line-height: 1.55; color: var(--text-secondary);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    flex: 1;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: auto; padding-top: 0.48rem; border-top: 1px solid var(--border);
  }
  .card-date { font-size: 0.68rem; color: var(--text-muted); }
  .card-link {
    font-size: 0.7rem; color: var(--accent-2);
    display: flex; align-items: center; gap: 0.22rem;
    opacity: 0; transition: opacity 0.2s;
  }
  .news-card:hover .card-link { opacity: 1; }

  /* ── Skeleton ── */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.25); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 7px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .skeleton-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.1rem 1.15rem; display: flex; flex-direction: column; gap: 0.65rem;
  }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
  .empty-icon { font-size: 2.8rem; margin-bottom: 0.9rem; opacity: 0.4; }
  .empty-text { font-size: 0.88rem; }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 0.35rem; margin-top: 2rem;
  }
  .page-btn {
    min-width: 34px; height: 34px; border-radius: 8px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 0.8rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; font-family: inherit;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent-2); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .page-btn:disabled { opacity: 0.3; pointer-events: none; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 1.4rem; right: 1.4rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 11px; padding: 0.7rem 1rem;
    font-size: 0.8rem; color: var(--text-primary);
    box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    display: flex; align-items: center; gap: 0.55rem;
    z-index: 200; transform: translateY(90px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Email modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 18px; padding: 1.8rem; width: min(420px, 90vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.4rem; }
  .modal-desc { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1.1rem; line-height: 1.5; }
  .modal-input {
    width: 100%; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 9px;
    padding: 0.55rem 0.85rem;
    font-size: 0.84rem; color: var(--text-primary);
    outline: none; font-family: inherit; margin-bottom: 0.85rem;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 0.6rem; }
  .modal-send-btn {
    flex: 1; background: linear-gradient(135deg, #0f40c8, #1464f6);
    color: white; border: none; border-radius: 9px;
    padding: 0.55rem; font-size: 0.84rem; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: opacity 0.2s;
  }
  .modal-send-btn:hover { opacity: 0.88; }
  .modal-send-btn:disabled { opacity: 0.4; cursor: default; }
  .modal-cancel-btn {
    background: var(--bg-card); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 9px;
    padding: 0.55rem 1rem; font-size: 0.84rem;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .modal-cancel-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .modal-status { font-size: 0.78rem; margin-top: 0.7rem; min-height: 1.2em; color: var(--text-secondary); }

  /* ── Page nav bar ── */
  .page-nav-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
  }
  .page-nav { display: flex; gap: 0; }
  .page-nav-btn {
    padding: 0.6rem 1.2rem; border: none; border-bottom: 2px solid transparent;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--text-secondary);
    font-family: inherit; transition: all 0.18s;
  }
  .page-nav-btn:hover { color: var(--text-primary); }
  .page-nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Market dashboard ── */
  #marketPage { display: none; }
  .market-layout { display: flex; gap: 1.2rem; align-items: flex-start; }
  .market-sidebar {
    width: 200px; flex-shrink: 0;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.6rem; position: sticky; top: 75px;
  }
  .market-sidebar-title {
    font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.3rem 0.5rem 0.5rem;
  }
  .mcat-btn {
    display: block; width: 100%; text-align: left;
    padding: 0.38rem 0.6rem; border-radius: 7px; border: none;
    font-size: 0.82rem; font-weight: 500; cursor: pointer;
    background: transparent; color: var(--text-secondary);
    font-family: inherit; transition: all 0.15s; margin-bottom: 2px;
  }
  .mcat-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .mcat-btn.active { background: rgba(20,100,246,0.15); color: var(--accent-2); font-weight: 600; }
  .market-main { flex: 1; min-width: 0; }
  .market-toolbar {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .market-item-btns { display: flex; gap: 0.3rem; flex-wrap: wrap; flex: 1; }
  .mitem-btn {
    padding: 0.28rem 0.7rem; border-radius: 6px; border: 1px solid var(--border);
    font-size: 0.76rem; cursor: pointer; background: var(--bg-card);
    color: var(--text-secondary); font-family: inherit; transition: all 0.15s;
    white-space: nowrap;
  }
  .mitem-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .mitem-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

">

  <div id="annotTooltipTitle" style="font-size:0.82rem;color:var(--text-primary);line-height:1.4"></div>
  <div style="font-size:0.7rem;color:var(--text-muted);margin-top:0.3rem">點擊開啟新聞</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────
const state = {
  categories: [],   // empty = all; array of selected category strings
  source:     '全部',
  q:          '',
  dateFilter: '',
  page:       1,
  total:      0,
  perPage:    20,
  loading:    false,
};

// Source → CSS class
const SRC_CLASS = {
  'Digitimes':      'src-digitimes',
  '工商時報':        'src-ctee',
  '經濟日報':        'src-udn',
  '科技新報':        'src-technews',
  'iThome':         'src-ithome',
  "Tom's Hardware": 'src-toms',
  'Yahoo財經':       'src-yahoo',
  'Yahoo新聞':       'src-yahoo',
  '電腦王':          'src-technews',
};

// Category → CSS class
const CAT_CLASS = {
  'AI 產業':    'cat-ai',
  '記憶體/儲存': 'cat-mem',
  '半導體':      'cat-semi',
  'PC / NB':   'cat-pc',
  '伺服器/雲端': 'cat-server',
  '面板/顯示':   'cat-panel',
  '電競/ROG':   'cat-gaming',
  '供應鏈/關稅': 'cat-supply',
  '財報/法說':   'cat-fin',
  '財務風險':    'cat-risk',
};

const CATS = ['AI 產業','記憶體/儲存','半導體','PC / NB','伺服器/雲端','面板/顯示','電競/ROG','供應鏈/關稅','財報/法說','財務風險','ESG永續'];

// ── Theme ──────────────────────────────────────────────────
let dark = false;
document.getElementById('themeToggle').addEventListener('click', () => {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = dark ? '🌙' : '☀️';
});

// ── Mobile search toggle ───────────────────────────────────
document.getElementById('searchToggle')?.addEventListener('click', () => {
  const bar = document.getElementById('mobileSearchBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open'))
    document.getElementById('mobileSearchInput').focus();
});
let mobileSearchTimer;
document.getElementById('mobileSearchInput')?.addEventListener('input', e => {
  clearTimeout(mobileSearchTimer);
  mobileSearchTimer = setTimeout(() => {
    state.q = e.target.value.trim();
    state.page = 1; loadNews();
  }, 380);
});

// ── Load news ──────────────────────────────────────────────
async function loadNews() {
  if (state.loading) return;
  state.loading = true;
  const p = new URLSearchParams({
    categories:  state.categories.join(','),
    source:      state.source,
    q:           state.q,
    date_filter: state.dateFilter,
    page:        state.page,
  });
  try {
    const res  = await fetch('/api/news?' + p);
    const data = await res.json();
    state.total = data.total;
    if (data.articles) window._newsCache = (window._newsCache||[]).concat(data.articles).slice(-500);
    renderCards(data.articles);
    renderPagination(data.total, data.page, data.per_page);

    // Update last-updated timestamp
    if (data.last_updated)
      document.getElementById('lastUpdate').textContent = '更新：' + data.last_updated;
    if (data.loading)
      document.getElementById('lastUpdate').textContent = '⟳ 抓取中…';

    // Update tab counts from this response (filtered by source+date, not category)
    if (data.cat_counts) {
      const grandTotal = Object.values(data.cat_counts).reduce((s,v)=>s+v, 0);
      document.getElementById('cnt-全部').textContent = grandTotal;

      });

    // Update source stats bar
    if (data.src_counts) {
      document.getElementById('statDigitimes').textContent = data.src_counts['Digitimes']     || 0;
      document.getElementById('statCtee').textContent      = data.src_counts['工商時報']       || 0;
      document.getElementById('statTechnews').textContent  = data.src_counts['科技新報']       || 0;
      document.getElementById('statToms').textContent      = data.src_counts["Tom's Hardware"] || 0;
    }

    // Update filtered result count
    const isFiltered = state.categories.length > 0 || state.source !== '全部'
                    || state.q || state.dateFilter;

    }
  } catch {
    showToast('❌ 載入失敗，請稍後重試');
  } finally {
    state.loading = false;
  }
}

// ── Date helpers ───────────────────────────────────────────
function formatDateSep(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const diff  = Math.round((today - d) / 86400000);
    const days  = ['日','一','二','三','四','五','六'];
    const wd    = days[d.getDay()];
    const label = diff === 0 ? '今天' : diff === 1 ? '昨天' : diff === 2 ? '前天' : '';
    const ymd   = `${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
    return label ? `${label} · ${ymd}` : ymd;
  } catch { return dateStr; }
}

// ── Render cards with date separators ─────────────────────
function renderCards(articles) {
  const grid = document.getElementById('newsGrid');
  ['sk1','sk2','sk3'].forEach(id => { const e = document.getElementById(id); if(e) e.remove(); });

  if (!articles.length) {

    return;
  }

  let html = '';
  let lastDate = null;

  for (const a of articles) {

    if (dateStr && dateStr !== lastDate) {
      lastDate = dateStr;
      html += `<div class="date-sep"><span class="date-sep-label">${formatDateSep(dateStr)}</span></div>`;
    }

    const srcCls = SRC_CLASS[a.source] || 'src-global';
    const catCls = CAT_CLASS[a.category] || 'cat-supply';
    const sumHtml = a.summary ? `<p class="card-summary">${esc(a.summary)}</p>` : '';
    const dateDisp = a.published
      ? a.published.slice(0, 16)
      : (a.fetched_at || '').slice(0, 16);

      ? `<span class="risk-badge ${a.watchlist_risk === '紅' ? 'risk-red' : 'risk-yellow'}">${a.watchlist_risk === '紅' ? '🔴' : '🟡'} ${esc(a.watchlist_vendor)}</span>`
      : '';

    html += `
    <a class="news-card" href="${esc(a.source_url)}" target="_blank" rel="noopener noreferrer">
      <div class="card-header">
        <span class="source-badge ${srcCls}">${esc(a.source)}</span>

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Pagination ─────────────────────────────────────────────
function renderPagination(total, page, perPage) {
  const pages = Math.ceil(total / perPage);
  const wrap  = document.getElementById('pagination');
  if (pages <= 1) { wrap.innerHTML = ''; return; }
  let h = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  const rng = [];
  for (let i = Math.max(1,page-2); i <= Math.min(pages,page+2); i++) rng.push(i);
  if (rng[0]>1) { h+=`<button class="page-btn" onclick="goPage(1)">1</button>`; if(rng[0]>2)h+=`<span style="color:var(--text-muted);padding:0 .25rem">…</span>`; }
  rng.forEach(p => { h+=`<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`; });
  if (rng.at(-1)<pages) { if(rng.at(-1)<pages-1)h+=`<span style="color:var(--text-muted);padding:0 .25rem">…</span>`; h+=`<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`; }
  h+=`<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
  wrap.innerHTML = h;
}

// ── Category Digest ────────────────────────────────────────
const CAT_ICON = {
  'AI 產業':'🤖','記憶體/儲存':'💾','半導體':'⚙️','PC / NB':'💻',
  '伺服器/雲端':'🖥','面板/顯示':'📺','電競/ROG':'🎮',
  '供應鏈/關稅':'📦','財報/法說':'📊','財務風險':'⚠️','ESG永續':'♻️'
};
let _digestAbort = null;

function fetchDigest(category) {
  const panel   = document.getElementById('digestPanel');
  const content = document.getElementById('digestContent');
  if (!category) { panel.classList.remove('visible'); return; }

  panel.classList.add('visible');
  content.innerHTML = `<div class="digest-loading"><div class="digest-spinner"></div>正在整理今日焦點…</div>`;

  if (_digestAbort) _digestAbort.abort();
  _digestAbort = new AbortController();

  fetch('/api/digest?category=' + encodeURIComponent(category), { signal: _digestAbort.signal })
    .then(r => r.json())
    .then(data => {
      if (!data.points || data.points.length === 0) {
        panel.classList.remove('visible'); return;
      }
      const icon = CAT_ICON[category] || '📌';
      const badge = data.ai_powered
        ? `<span class="digest-ai-badge">✦ AI 摘要</span>` : '';

      const pointsHtml = data.points.map(p =>
        `<div class="digest-point"><span class="digest-bullet">▸</span><span>${esc(p)}</span></div>`
      ).join('');

      let linksHtml = '';
      if (data.articles && data.articles.length) {
        linksHtml = `<hr class="digest-divider">
          <div class="digest-links-title">相關文章</div>
          <div class="digest-links">` +
          data.articles.map(a =>
            `<a class="digest-link" href="${esc(a.url)}" target="_blank" rel="noopener">
              <span class="digest-link-icon">↗</span>
              <span class="digest-link-title">${esc(a.title)}</span>
              <span class="digest-link-src">${esc(a.source)}</span>
            </a>`
          ).join('') + `</div>`;
      }

      content.innerHTML = `
        <div class="digest-header">
          <span class="digest-header-icon">${icon}</span>
          <span class="digest-header-title">${esc(category)} 今日焦點</span>
          ${badge}
        </div>
        <div class="digest-points">${pointsHtml}</div>
        ${linksHtml}`;
    })
    .catch(e => { if (e.name !== 'AbortError') panel.classList.remove('visible'); });
}

let _marketData      = [];

let _customStart     = null;

let _newsArticles    = [];   // {date, title, url} for chart annotation dots

let _annotPixels     = [];   // [{x, y, article}] pixel positions of annotation dots
let _canvasHandlers  = null; // stored so we can remove/re-add on chart rebuild

// Local date string (avoids UTC shift showing yesterday in Taiwan timezone)
function toLocalDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Return {start, end} ISO strings for current range selection
function getCurrentRange() {
  if (_activeDays === -1 && _customStart) {
    return { start: _customStart, end: _customEnd || toLocalDateStr(new Date()) };
  }
  if (_activeDays === 0) return { start: null, end: null };
  const end   = new Date();
  const start = new Date();
  start.setDate(start.getDate() - _activeDays);
  return { start: toLocalDateStr(start), end: toLocalDateStr(end) };
}

function applyCustomRange() {
  _customStart = document.getElementById('rangeFrom').value;
  _customEnd   = document.getElementById('rangeTo').value;

function shortName(name) {
  return name
    .replace(/\s*\([^)]*\)\s*/g, ' ')
    .replace(/\s*(US\$|CNY\$|USD)\/.*$/, '')
    .replace(/\s+/g, ' ').trim();
}

function selectMarketItem(name) {
  _activeItem = name;
  _newsArticles = [];
  document.querySelectorAll('.mitem-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === shortName(name))
  );
  renderChart();
  renderMarketNews();
}

function filterByRange(dates, values) {
  const { start, end } = getCurrentRange();
  if (!start) return { dates, values };
  const fd = [], fv = [];
  dates.forEach((d, i) => {
    if (d >= start && d <= end) { fd.push(d); fv.push(values[i]); }
  });
  return { dates: fd, values: fv };
}

function buildAnnotations(chartDates, chartValues) {
  const annotations = {};
  _newsArticles.forEach((article, i) => {
    const nd = article.date;
    let idx = chartDates.indexOf(nd);
    if (idx < 0) idx = chartDates.findIndex(d => d >= nd);
    if (idx < 0) return;
    let yVal = null, yIdx = idx;
    for (let k = idx; k < chartValues.length; k++) {
      if (chartValues[k] !== null) { yVal = chartValues[k]; yIdx = k; break; }
    }
    if (yVal === null) return;
    annotations[`news_${i}`] = {
      type: 'point',
      xValue: chartDates[yIdx],
      yValue: yVal,
      yAdjust: -18,
      radius: 7,
      backgroundColor: 'rgba(251,191,36,0.9)',
      borderColor: '#f59e0b',
      borderWidth: 2,
    };
  });
  return annotations;
}

// Calculate canvas pixel positions of all annotation dots (for mouse hit-testing)
function _updateAnnotPixels() {
  _annotPixels = [];
  if (!_chartInst) return;
  const ann    = _chartInst.options.plugins.annotation.annotations || {};
  const xScale = _chartInst.scales.x;
  const yScale = _chartInst.scales.y;
  const labels = _chartInst.data.labels;
  Object.entries(ann).forEach(([key, a]) => {
    const idx     = parseInt(key.replace('news_', ''));
    const article = _newsArticles[idx];
    if (!article) return;
    // category scale requires numeric index
    const labelIdx = labels.indexOf(a.xValue);
    if (labelIdx < 0) return;
    const xPixel = xScale.getPixelForValue(labelIdx);
    const yPixel = yScale.getPixelForValue(a.yValue) + (a.yAdjust || 0);
    if (!isFinite(xPixel) || !isFinite(yPixel)) return;
    _annotPixels.push({ x: xPixel, y: yPixel, article });
  });
}

// Attach mousemove / click handlers directly on the canvas for annotation interactivity
function _setupCanvasAnnotEvents() {
  const canvas = document.getElementById('marketChart');
  if (_canvasHandlers) {
    canvas.removeEventListener('mousemove',  _canvasHandlers.move);
    canvas.removeEventListener('mouseleave', _canvasHandlers.leave);
    canvas.removeEventListener('click',      _canvasHandlers.click);
  }
  const tt = document.getElementById('annotTooltip');

  const onMove = e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let found = null;
    for (const p of _annotPixels) {
      if ((mx-p.x)**2 + (my-p.y)**2 < 144) { found = p; break; } // 12px radius
    }
    if (found) {
      document.getElementById('annotTooltipDate').textContent  = found.article.date;
      document.getElementById('annotTooltipTitle').textContent = found.article.title;
      tt.style.display = 'block';
      const vw = window.innerWidth, vh = window.innerHeight;
      let lx = e.clientX + 14, ly = e.clientY + 14;
      if (lx + 305 > vw) lx = e.clientX - 315;
      if (ly + 95  > vh) ly = e.clientY - 105;
      tt.style.left = lx + 'px';
      tt.style.top  = ly + 'px';
      canvas.style.cursor = 'pointer';
    } else {
      tt.style.display = 'none';
      canvas.style.cursor = '';
    }
  };
  const onLeave = () => { tt.style.display = 'none'; canvas.style.cursor = ''; };
  const onClick  = e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    for (const p of _annotPixels) {
      if ((mx-p.x)**2 + (my-p.y)**2 < 144 && p.article.url) {
        window.open(p.article.url, '_blank', 'noopener'); break;
      }
    }
  };
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseleave', onLeave);
  canvas.addEventListener('click',      onClick);
  _canvasHandlers = { move: onMove, leave: onLeave, click: onClick };
}

function renderChart() {
  const item = _marketData.find(d => d.name === _activeItem);
  if (!item) return;

  const { dates, values } = filterByRange(item.dates, item.values);
  const displayName = shortName(item.name);
  document.getElementById('chartTitle').textContent = displayName;
  document.getElementById('chartMeta').textContent  = item.unit || '';

  // Latest value display
  const latestVal = [...values].reverse().find(v => v !== null);
  document.getElementById('chartLatest').textContent =
    latestVal != null ? latestVal.toLocaleString() + (item.unit ? '  ' + item.unit : '') : '—';

  // Range-based change: compare first vs last non-null value in selected range
  const chEl    = document.getElementById('chartChange');
  const nonNull = values.map((v,i) => v!==null ? {v,d:dates[i]} : null).filter(Boolean);
  if (nonNull.length >= 2) {
    const first = nonNull[0], last = nonNull[nonNull.length - 1];
    const pct   = ((last.v - first.v) / first.v * 100).toFixed(2);
    const isUp  = parseFloat(pct) >= 0;
    chEl.className   = isUp ? 'chart-change-up' : 'chart-change-down';
    chEl.style.color = '';
    chEl.textContent = `${isUp ? '▲ +' : '▼ '}${pct}%（${first.d} → ${last.d}）`;
  } else {
    chEl.textContent = ''; chEl.className = '';
  }

  // No data
  if (!nonNull.length) {
    if (_chartInst) { _chartInst.destroy(); _chartInst = null; }
    document.getElementById('marketChart').getContext('2d')
      .clearRect(0, 0, 9999, 9999);
    chEl.textContent = '此品項暫無歷史資料';
    chEl.style.color = 'var(--text-muted)';
    chEl.style.fontSize = '0.8rem';
    return;
  }

  const isDark    = document.documentElement.getAttribute('data-theme') !== 'light';
  const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#8892aa' : '#64748b';
  const ctx       = document.getElementById('marketChart').getContext('2d');

  if (_chartInst) _chartInst.destroy();
  _chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [{
        data: values,
        borderColor: '#1464f6',
        backgroundColor: 'rgba(20,100,246,0.08)',
        borderWidth: 2,
        pointRadius: dates.length > 60 ? 0 : 3,
        pointHoverRadius: 5,
        fill: true, tension: 0.3, spanGaps: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: c => c.parsed.y != null ? c.parsed.y.toLocaleString() + ' ' + (item.unit||'') : '—' }
        },
        annotation: { annotations: buildAnnotations(dates, values) }
      },
      scales: {
        x: { ticks: { color: textColor, maxTicksLimit: 8 }, grid: { color: gridColor } },
        y: { ticks: { color: textColor }, grid: { color: gridColor } }
      }
    }
  });
  // Set up canvas mouse-hit detection for annotation dots
  setTimeout(() => { _updateAnnotPixels(); _setupCanvasAnnotEvents(); }, 60);
}

async function renderMarketNews() {
  if (!_activeItem) return;
  const kw  = shortName(_activeItem);
  const { start, end } = getCurrentRange();
  const wrap = document.getElementById('marketNewsList');
  const rangeLabel = start ? `${start} ～ ${end || '今天'}` : '全部';
  document.getElementById('marketNewsTitle').textContent = `相關新聞（${rangeLabel}）`;
  wrap.innerHTML = `<div style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem">🔍 搜尋中…</div>`;

  let q = kw + ' 價格';
  if (start) q += ` after:${start}`;
  if (end)   q += ` before:${end}`;

  try {
    const res  = await fetch('/api/commodity-news?q=' + encodeURIComponent(q));
    const data = await res.json();
    const articles = data.articles || [];

    // Extract article data for chart annotation dots (hover tooltip + click)
    _newsArticles = articles
      .map(a => {
        try {
          return { date: new Date(a.published).toISOString().slice(0,10), title: a.title, url: a.source_url };
        } catch { return null; }
      })
      .filter(Boolean);

    // Re-render chart with annotations
    if (_chartInst && _newsArticles.length) {
      _chartInst.options.plugins.annotation.annotations =
        buildAnnotations(_chartInst.data.labels, _chartInst.data.datasets[0].data);
      _chartInst.update('none');
      setTimeout(_updateAnnotPixels, 60); // refresh hit-test positions
    }

    if (!articles.length) {
      wrap.innerHTML = `<div style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem">此區間無相關新聞</div>`;
      return;
    }
    wrap.innerHTML = articles.map(a => {
      const dateStr = (() => { try { return new Date(a.published).toISOString().slice(0,10); } catch { return ''; } })();
      return `
      <a class="market-news-item" href="${esc(a.source_url)}" target="_blank" rel="noopener">
        <div>
          <div class="market-news-item-title">${esc(a.title)}</div>
          <div class="market-news-item-meta">${esc(a.source)} · ${esc(dateStr)}</div>
        </div>
      </a>`;
    }).join('');
  } catch(e) {
    wrap.innerHTML = `<div style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem">無法載入新聞</div>`;
  }
}

// Sidebar category click
document.querySelectorAll('.mcat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    _activeCat = btn.dataset.mcat; _activeItem = null;
    _newsArticles = [];
    renderMarketSidebar(); renderMarketItems();
  });
});

// Time range click
document.getElementById('timeBtns').addEventListener('click', e => {
  const btn = e.target.closest('.time-btn');
  if (!btn) return;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _activeDays = parseInt(btn.dataset.days);
  const customRow = document.getElementById('customRangeRow');
  customRow.style.display = _activeDays === -1 ? 'flex' : 'none';
  if (_activeDays !== -1) { renderChart(); renderMarketNews(); }
});


</script>
</body>
