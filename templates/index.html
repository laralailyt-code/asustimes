<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASUSTIMES — 科技產業情報</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-primary:    #090c14;
    --bg-secondary:  #0d1120;
    --bg-card:       #111827;
    --bg-card-hover: #161d30;
    --border:        rgba(255,255,255,0.07);
    --border-hover:  rgba(20,120,255,0.35);
    --text-primary:  #e2e8f4;
    --text-secondary:#8892aa;
    --text-muted:    #4d566e;
    --accent:        #1464f6;
    --accent-2:      #4d8fff;
    --accent-light:  #7eb3ff;
    --glow:          rgba(20,100,246,0.18);
    --glow-card:     rgba(20,100,246,0.08);
  }
  [data-theme="light"] {
    --bg-primary:    #f0f4fb;
    --bg-secondary:  #ffffff;
    --bg-card:       #ffffff;
    --bg-card-hover: #f0f6ff;
    --border:        rgba(0,0,0,0.07);
    --border-hover:  rgba(20,100,246,0.3);
    --text-primary:  #0f172a;
    --text-secondary:#475569;
    --text-muted:    #94a3b8;
    --accent:        #1249c8;
    --accent-2:      #1464f6;
    --accent-light:  #3b82f6;
    --glow:          rgba(20,100,246,0.12);
    --glow-card:     rgba(20,100,246,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

  /* ── Header ── */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(20px);
  }
  .header-inner {
    max-width: 1440px; margin: 0 auto;
    padding: 0 1.5rem; height: 62px;
    display: flex; align-items: center; gap: 1.2rem;
  }

  /* ── Logo ── */
  .logo { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; flex-shrink: 0; }
  .logo-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #0f40c8, #1464f6, #38a3ff);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; font-weight: 800;
    color: white; font-family: 'Inter', sans-serif;
    letter-spacing: -0.05em;
    box-shadow: 0 0 18px var(--glow), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .logo-name {
    font-family: 'Inter', sans-serif;
    font-size: 1.18rem; font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ffffff 30%, var(--accent-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  [data-theme="light"] .logo-name {
    background: linear-gradient(135deg, #0a1f5e, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 0.62rem; color: var(--text-muted);
    letter-spacing: 0.04em; margin-top: -1px;
    font-family: 'Inter', sans-serif;
  }

  /* ── Search ── */
  .search-wrap { flex: 1; max-width: 420px; position: relative; }
  .search-icon {
    position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 0.82rem; pointer-events: none;
  }
  .search-input {
    width: 100%; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 0.5rem 0.85rem 0.5rem 2.3rem;
    font-size: 0.84rem; color: var(--text-primary);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }

  /* Mobile search bar (hidden by default, shown below header) */
  .mobile-search-bar {
    display: none;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
  }
  .mobile-search-bar.open { display: flex; }
  .mobile-search-bar .search-input { max-width: 100%; }

  .header-actions { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
  .btn-icon {
    width: 34px; height: 34px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 0.88rem;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent-2); }

  .refresh-btn {
    display: flex; align-items: center; gap: 0.4rem;
    background: linear-gradient(135deg, #0f40c8, #1464f6);
    color: white; border: none; border-radius: 9px;
    padding: 0.42rem 0.9rem; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    font-family: inherit; letter-spacing: 0.01em;
    box-shadow: 0 2px 10px var(--glow);
  }
  .refresh-btn:hover { opacity: 0.88; }
  .refresh-btn:active { transform: scale(0.97); }
  .refresh-btn.loading { opacity: 0.55; pointer-events: none; }

  /* ── Main ── */
  .main { max-width: 1440px; margin: 0 auto; padding: 1.4rem 1.5rem; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    padding: 0.7rem 1.1rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 1.1rem;
  }
  .stat-item { display: flex; align-items: center; gap: 0.38rem; font-size: 0.76rem; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .stat-label { color: var(--text-muted); }
  .stat-value { color: var(--text-primary); font-weight: 600; }
  .stat-sep { width: 1px; height: 13px; background: var(--border); }
  .last-update { margin-left: auto; font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }

  /* ── Date filter pills ── */
  .date-filters { display: flex; gap: 0.4rem; margin-bottom: 0.7rem; flex-wrap: wrap; align-items: center; }
  .date-label { font-size: 0.72rem; color: var(--text-muted); margin-right: 0.2rem; }
  .date-pill {
    padding: 0.22rem 0.65rem; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-card);
    font-size: 0.72rem; cursor: pointer; transition: all 0.18s;
    color: var(--text-secondary); font-family: inherit; font-weight: 500;
  }
  .date-pill:hover { border-color: var(--accent); color: var(--accent-2); }
  .date-pill.active {
    background: var(--accent); border-color: var(--accent);
    color: white; box-shadow: 0 0 8px var(--glow);
  }

  /* ── Source pills ── */
  .source-filters { display: flex; gap: 0.4rem; margin-bottom: 0.9rem; flex-wrap: wrap; }
  .source-pill {
    padding: 0.27rem 0.75rem; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-card);
    font-size: 0.73rem; cursor: pointer; transition: all 0.18s;
    color: var(--text-secondary); font-family: inherit; font-weight: 500;
  }
  .source-pill:hover { border-color: var(--accent); color: var(--accent-2); }
  .source-pill.active {
    background: var(--accent); border-color: var(--accent);
    color: white; box-shadow: 0 0 10px var(--glow);
  }

  /* ── Category tabs (multi-select) ── */
  .tabs {
    display: flex; gap: 0.2rem; margin-bottom: 0.6rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.28rem;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 0.38rem 0.85rem; border-radius: 8px;
    font-size: 0.8rem; font-weight: 500; cursor: pointer;
    transition: all 0.18s; white-space: nowrap; border: none;
    background: transparent; color: var(--text-secondary); font-family: inherit;
    user-select: none;
  }
  .tab:hover { color: var(--text-primary); background: var(--bg-card-hover); }
  .tab.active { background: var(--accent); color: white; box-shadow: 0 2px 10px var(--glow); }
  .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.14); border-radius: 10px;
    padding: 0 0.38rem; font-size: 0.66rem; margin-left: 0.28rem;
    min-width: 1.3rem; height: 1.3rem; font-weight: 600;
  }
  .multi-hint {
    font-size: 0.68rem; color: var(--text-muted); margin-bottom: 1rem;
    padding-left: 0.3rem;
  }

  /* ── Result bar ── */
  .result-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.8rem; min-height: 1.4rem;
  }
  .result-count { font-size: 0.75rem; color: var(--text-muted); }
  .result-count strong { color: var(--text-secondary); }

  /* ── News grid ── */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(345px, 1fr));
    gap: 1rem;
  }

  /* ── Date separator ── */
  .date-sep {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 0.75rem;
    margin-top: 0.4rem;
  }
  .date-sep::before, .date-sep::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .date-sep-label {
    font-size: 0.7rem; color: var(--text-muted); white-space: nowrap;
    font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.06em;
    background: var(--bg-card); padding: 0.2rem 0.6rem; border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ── News card ── */
  .news-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.1rem 1.15rem;
    display: flex; flex-direction: column; gap: 0.55rem;
    transition: all 0.22s; cursor: pointer; text-decoration: none;
    position: relative; overflow: hidden;
  }
  .news-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), #38a3ff, #60efff);
    opacity: 0; transition: opacity 0.22s;
  }
  .news-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.18), 0 0 0 1px var(--glow-card);
  }
  .news-card:hover::before { opacity: 1; }

  .card-header { display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }

  /* Source badges */
  .source-badge {
    font-size: 0.66rem; font-weight: 700; padding: 0.13rem 0.5rem;
    border-radius: 5px; border: 1px solid; white-space: nowrap;
    letter-spacing: 0.03em; font-family: 'Inter', sans-serif;
  }
  .src-digitimes  { color: #60a5fa; border-color: rgba(96,165,250,0.3);  background: rgba(96,165,250,0.08); }
  .src-ctee       { color: #fbbf24; border-color: rgba(251,191,36,0.3);  background: rgba(251,191,36,0.08); }
  .src-udn        { color: #34d399; border-color: rgba(52,211,153,0.3);  background: rgba(52,211,153,0.08); }
  .src-technews   { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
  .src-ithome     { color: #fb923c; border-color: rgba(251,146,60,0.3);  background: rgba(251,146,60,0.08); }
  .src-toms       { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }
  .src-yahoo      { color: #38bdf8; border-color: rgba(56,189,248,0.3);  background: rgba(56,189,248,0.08); }
  .src-global     { color: #94a3b8; border-color: rgba(148,163,184,0.25); background: rgba(148,163,184,0.07); }

  /* Category tags */
  .cat-tag { font-size: 0.65rem; padding: 0.12rem 0.48rem; border-radius: 5px; font-weight: 600; }
  .cat-ai      { color: #c084fc; background: rgba(192,132,252,0.12); }
  .cat-mem     { color: #60a5fa; background: rgba(96,165,250,0.12);  }
  .cat-semi    { color: #fb923c; background: rgba(251,146,60,0.12);  }
  .cat-pc      { color: #22d3ee; background: rgba(34,211,238,0.12);  }
  .cat-server  { color: #4ade80; background: rgba(74,222,128,0.12);  }
  .cat-panel   { color: #fbbf24; background: rgba(251,191,36,0.12);  }
  .cat-gaming  { color: #f87171; background: rgba(248,113,113,0.12); }
  .cat-supply  { color: #94a3b8; background: rgba(148,163,184,0.12); }
  .cat-fin     { color: #34d399; background: rgba(52,211,153,0.12);  }
  .cat-risk    { color: #f87171; background: rgba(248,113,113,0.12); }

  /* Watchlist risk badges */
  .risk-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 0.63rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.02em; white-space: nowrap;
  }
  .risk-red    { background: rgba(239,68,68,0.18);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .risk-yellow { background: rgba(234,179,8,0.15);  color: #eab308; border: 1px solid rgba(234,179,8,0.3); }

  .card-title {
    font-size: 0.88rem; font-weight: 600; line-height: 1.5;
    color: var(--text-primary);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-summary {
    font-size: 0.76rem; line-height: 1.55; color: var(--text-secondary);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    flex: 1;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: auto; padding-top: 0.48rem; border-top: 1px solid var(--border);
  }
  .card-date { font-size: 0.68rem; color: var(--text-muted); }
  .card-link {
    font-size: 0.7rem; color: var(--accent-2);
    display: flex; align-items: center; gap: 0.22rem;
    opacity: 0; transition: opacity 0.2s;
  }
  .news-card:hover .card-link { opacity: 1; }

  /* ── Skeleton ── */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.25); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 7px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .skeleton-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.1rem 1.15rem; display: flex; flex-direction: column; gap: 0.65rem;
  }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
  .empty-icon { font-size: 2.8rem; margin-bottom: 0.9rem; opacity: 0.4; }
  .empty-text { font-size: 0.88rem; }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 0.35rem; margin-top: 2rem;
  }
  .page-btn {
    min-width: 34px; height: 34px; border-radius: 8px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 0.8rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; font-family: inherit;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent-2); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .page-btn:disabled { opacity: 0.3; pointer-events: none; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 1.4rem; right: 1.4rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 11px; padding: 0.7rem 1rem;
    font-size: 0.8rem; color: var(--text-primary);
    box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    display: flex; align-items: center; gap: 0.55rem;
    z-index: 200; transform: translateY(90px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Email modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 18px; padding: 1.8rem; width: min(420px, 90vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.4rem; }
  .modal-desc { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1.1rem; line-height: 1.5; }
  .modal-input {
    width: 100%; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 9px;
    padding: 0.55rem 0.85rem;
    font-size: 0.84rem; color: var(--text-primary);
    outline: none; font-family: inherit; margin-bottom: 0.85rem;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 0.6rem; }
  .modal-send-btn {
    flex: 1; background: linear-gradient(135deg, #0f40c8, #1464f6);
    color: white; border: none; border-radius: 9px;
    padding: 0.55rem; font-size: 0.84rem; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: opacity 0.2s;
  }
  .modal-send-btn:hover { opacity: 0.88; }
  .modal-send-btn:disabled { opacity: 0.4; cursor: default; }
  .modal-cancel-btn {
    background: var(--bg-card); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 9px;
    padding: 0.55rem 1rem; font-size: 0.84rem;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .modal-cancel-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .modal-status { font-size: 0.78rem; margin-top: 0.7rem; min-height: 1.2em; color: var(--text-secondary); }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .header-inner { padding: 0 1rem; gap: 0.7rem; }
    .logo-sub, .search-wrap { display: none; }
    .main { padding: 1rem; }
    .news-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 0.6rem; }
    .stat-sep { display: none; }
  }
  @media (min-width: 641px) {
    .btn-search-mobile { display: none !important; }
    .mobile-search-bar { display: none !important; }
  }
</style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark">A</div>
      <div>
        <div class="logo-name">ASUSTIMES</div>
        <div class="logo-sub">ASUS 科技產業情報中心</div>
      </div>
    </a>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput" type="text"
             placeholder="搜尋 AI、記憶體、半導體、電競…" />
    </div>

    <div class="header-actions">
      <!-- Mobile search toggle -->
      <button class="btn-icon btn-search-mobile" id="searchToggle" title="搜尋">🔍</button>
      <button class="btn-icon" id="themeToggle" title="切換主題">🌙</button>
      <button class="refresh-btn" id="refreshBtn" onclick="triggerRefresh()">
        <span id="refreshIcon">↻</span> 更新
      </button>
    </div>
  </div>
</header>

<!-- Mobile search bar -->
<div class="mobile-search-bar" id="mobileSearchBar">
  <div class="search-wrap" style="max-width:100%;width:100%">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="mobileSearchInput" type="text"
           placeholder="搜尋新聞…" />
  </div>
</div>

<!-- ── Main ──────────────────────────────────────────────── -->
<main class="main">

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-dot" style="background:#1464f6"></div>
      <span class="stat-label">科技新聞</span>
      <span class="stat-value" id="statTotal">—</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-item">
      <div class="stat-dot" style="background:#60a5fa"></div>
      <span class="stat-label">Digitimes</span>
      <span class="stat-value" id="statDigitimes">—</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-item">
      <div class="stat-dot" style="background:#fbbf24"></div>
      <span class="stat-label">工商時報</span>
      <span class="stat-value" id="statCtee">—</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-item">
      <div class="stat-dot" style="background:#a78bfa"></div>
      <span class="stat-label">科技新報</span>
      <span class="stat-value" id="statTechnews">—</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-item">
      <div class="stat-dot" style="background:#f87171"></div>
      <span class="stat-label">Tom's HW</span>
      <span class="stat-value" id="statToms">—</span>
    </div>
    <span class="last-update" id="lastUpdate">更新中…</span>
  </div>

  <!-- Date filter -->
  <div class="date-filters">
    <span class="date-label">📅 日期：</span>
    <button class="date-pill active" data-date="">全部</button>
    <button class="date-pill" data-date="today">今天</button>
    <button class="date-pill" data-date="yesterday">昨天</button>
    <button class="date-pill" data-date="3days">近3天</button>
  </div>

  <!-- Source filter -->
  <div class="source-filters" id="sourceFilters">
    <button class="source-pill active" data-source="全部">全部來源</button>
    <button class="source-pill" data-source="Digitimes">Digitimes</button>
    <button class="source-pill" data-source="工商時報">工商時報</button>
    <button class="source-pill" data-source="科技新報">科技新報</button>
    <button class="source-pill" data-source="iThome">iThome</button>
    <button class="source-pill" data-source="Tom's Hardware">Tom's HW</button>
    <button class="source-pill" data-source="Global Tech">Global</button>
    <button class="source-pill" data-source="Yahoo財經">Yahoo</button>
  </div>

  <!-- Category tabs (multi-select) -->
  <div class="tabs" id="categoryTabs">
    <button class="tab active" data-cat="全部">全部 <span class="tab-count" id="cnt-全部">0</span></button>
    <button class="tab" data-cat="AI 產業">🤖 AI 產業 <span class="tab-count" id="cnt-AI 產業">0</span></button>
    <button class="tab" data-cat="記憶體/儲存">💾 記憶體/儲存 <span class="tab-count" id="cnt-記憶體/儲存">0</span></button>
    <button class="tab" data-cat="半導體">⚙️ 半導體 <span class="tab-count" id="cnt-半導體">0</span></button>
    <button class="tab" data-cat="PC / NB">💻 PC / NB <span class="tab-count" id="cnt-PC / NB">0</span></button>
    <button class="tab" data-cat="伺服器/雲端">🖥 伺服器/雲端 <span class="tab-count" id="cnt-伺服器/雲端">0</span></button>
    <button class="tab" data-cat="面板/顯示">📺 面板/顯示 <span class="tab-count" id="cnt-面板/顯示">0</span></button>
    <button class="tab" data-cat="電競/ROG">🎮 電競/ROG <span class="tab-count" id="cnt-電競/ROG">0</span></button>
    <button class="tab" data-cat="供應鏈/關稅">📦 供應鏈/關稅 <span class="tab-count" id="cnt-供應鏈/關稅">0</span></button>
    <button class="tab" data-cat="財報/法說">📊 財報/法說 <span class="tab-count" id="cnt-財報/法說">0</span></button>
    <button class="tab" data-cat="財務風險">⚠️ 財務風險 <span class="tab-count" id="cnt-財務風險">0</span></button>
  </div>
  <div class="multi-hint" id="multiHint" style="display:none">💡 可同時選多個類別</div>

  <!-- Result count -->
  <div class="result-bar">
    <span class="result-count" id="resultCount"></span>
  </div>

  <!-- News grid -->
  <div class="news-grid" id="newsGrid">
    <div class="skeleton-card" id="sk1">
      <div class="skeleton" style="height:16px;width:55%"></div>
      <div class="skeleton" style="height:40px;width:100%"></div>
      <div class="skeleton" style="height:52px;width:100%"></div>
      <div class="skeleton" style="height:13px;width:38%"></div>
    </div>
    <div class="skeleton-card" id="sk2">
      <div class="skeleton" style="height:16px;width:48%"></div>
      <div class="skeleton" style="height:40px;width:100%"></div>
      <div class="skeleton" style="height:52px;width:100%"></div>
      <div class="skeleton" style="height:13px;width:32%"></div>
    </div>
    <div class="skeleton-card" id="sk3">
      <div class="skeleton" style="height:16px;width:60%"></div>
      <div class="skeleton" style="height:40px;width:100%"></div>
      <div class="skeleton" style="height:52px;width:100%"></div>
      <div class="skeleton" style="height:13px;width:42%"></div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</main>


<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────
const state = {
  categories: [],   // empty = all; array of selected category strings
  source:     '全部',
  q:          '',
  dateFilter: '',
  page:       1,
  total:      0,
  perPage:    20,
  loading:    false,
};

// Source → CSS class
const SRC_CLASS = {
  'Digitimes':      'src-digitimes',
  '工商時報':        'src-ctee',
  '經濟日報':        'src-udn',
  '科技新報':        'src-technews',
  'iThome':         'src-ithome',
  "Tom's Hardware": 'src-toms',
  'Yahoo財經':       'src-yahoo',
  'Yahoo新聞':       'src-yahoo',
  '電腦王':          'src-technews',
};

// Category → CSS class
const CAT_CLASS = {
  'AI 產業':    'cat-ai',
  '記憶體/儲存': 'cat-mem',
  '半導體':      'cat-semi',
  'PC / NB':   'cat-pc',
  '伺服器/雲端': 'cat-server',
  '面板/顯示':   'cat-panel',
  '電競/ROG':   'cat-gaming',
  '供應鏈/關稅': 'cat-supply',
  '財報/法說':   'cat-fin',
  '財務風險':    'cat-risk',
};

const CATS = ['AI 產業','記憶體/儲存','半導體','PC / NB','伺服器/雲端','面板/顯示','電競/ROG','供應鏈/關稅','財報/法說','財務風險'];

// ── Theme ──────────────────────────────────────────────────
let dark = true;
document.getElementById('themeToggle').addEventListener('click', () => {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = dark ? '🌙' : '☀️';
});

// ── Mobile search toggle ───────────────────────────────────
document.getElementById('searchToggle')?.addEventListener('click', () => {
  const bar = document.getElementById('mobileSearchBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open'))
    document.getElementById('mobileSearchInput').focus();
});
let mobileSearchTimer;
document.getElementById('mobileSearchInput')?.addEventListener('input', e => {
  clearTimeout(mobileSearchTimer);
  mobileSearchTimer = setTimeout(() => {
    state.q = e.target.value.trim();
    state.page = 1; loadNews();
  }, 380);
});

// ── Load news ──────────────────────────────────────────────
async function loadNews() {
  if (state.loading) return;
  state.loading = true;
  const p = new URLSearchParams({
    categories:  state.categories.join(','),
    source:      state.source,
    q:           state.q,
    date_filter: state.dateFilter,
    page:        state.page,
  });
  try {
    const res  = await fetch('/api/news?' + p);
    const data = await res.json();
    state.total = data.total;
    renderCards(data.articles);
    renderPagination(data.total, data.page, data.per_page);

    // Update last-updated timestamp
    if (data.last_updated)
      document.getElementById('lastUpdate').textContent = '更新：' + data.last_updated;
    if (data.loading)
      document.getElementById('lastUpdate').textContent = '⟳ 抓取中…';

    // Update tab counts from this response (filtered by source+date, not category)
    if (data.cat_counts) {
      const grandTotal = Object.values(data.cat_counts).reduce((s,v)=>s+v, 0);
      document.getElementById('cnt-全部').textContent = grandTotal;
      CATS.forEach(cat => {
        const el = document.getElementById('cnt-' + cat);
        if (el) el.textContent = data.cat_counts[cat] || 0;
      });
    }
    // Update source stats bar
    if (data.src_counts) {
      const grandTotal = Object.values(data.src_counts).reduce((s,v)=>s+v, 0);
      document.getElementById('statTotal').textContent     = grandTotal;
      document.getElementById('statDigitimes').textContent = data.src_counts['Digitimes']     || 0;
      document.getElementById('statCtee').textContent      = data.src_counts['工商時報']       || 0;
      document.getElementById('statTechnews').textContent  = data.src_counts['科技新報']       || 0;
      document.getElementById('statToms').textContent      = data.src_counts["Tom's Hardware"] || 0;
    }

    // Update filtered result count
    const isFiltered = state.categories.length > 0 || state.source !== '全部'
                    || state.q || state.dateFilter;
    const rcEl = document.getElementById('resultCount');
    if (isFiltered) {
      rcEl.innerHTML = `顯示 <strong>${data.total}</strong> 篇符合條件的新聞`;
    } else {
      rcEl.innerHTML = '';
    }
  } catch {
    showToast('❌ 載入失敗，請稍後重試');
  } finally {
    state.loading = false;
  }
}

async function loadStats() {
  try {
    const p = new URLSearchParams({ source: state.source, date_filter: state.dateFilter });
    const res  = await fetch('/api/stats?' + p);
    const data = await res.json();
    document.getElementById('statTotal').textContent     = data.total;
    document.getElementById('statDigitimes').textContent = data.sources['Digitimes']     || 0;
    document.getElementById('statCtee').textContent      = data.sources['工商時報']       || 0;
    document.getElementById('statTechnews').textContent  = data.sources['科技新報']       || 0;
    document.getElementById('statToms').textContent      = data.sources["Tom's Hardware"] || 0;

    document.getElementById('cnt-全部').textContent = data.total;
    CATS.forEach(cat => {
      const el = document.getElementById('cnt-' + cat);
      if (el) el.textContent = data.categories[cat] || 0;
    });

    if (data.last_updated)
      document.getElementById('lastUpdate').textContent = '更新：' + data.last_updated;
  } catch {}
}

// ── Date helpers ───────────────────────────────────────────
function formatDateSep(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const diff  = Math.round((today - d) / 86400000);
    const days  = ['日','一','二','三','四','五','六'];
    const wd    = days[d.getDay()];
    const label = diff === 0 ? '今天' : diff === 1 ? '昨天' : diff === 2 ? '前天' : '';
    const ymd   = `${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
    return label ? `${label} · ${ymd}` : ymd;
  } catch { return dateStr; }
}

// ── Render cards with date separators ─────────────────────
function renderCards(articles) {
  const grid = document.getElementById('newsGrid');
  ['sk1','sk2','sk3'].forEach(id => { const e = document.getElementById(id); if(e) e.remove(); });

  if (!articles.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">目前無符合條件的科技新聞</div></div>`;
    return;
  }

  let html = '';
  let lastDate = null;

  for (const a of articles) {
    const dateStr = (a.published || a.fetched_at || '').slice(0, 10);
    if (dateStr && dateStr !== lastDate) {
      lastDate = dateStr;
      html += `<div class="date-sep"><span class="date-sep-label">${formatDateSep(dateStr)}</span></div>`;
    }

    const srcCls = SRC_CLASS[a.source] || 'src-global';
    const catCls = CAT_CLASS[a.category] || 'cat-supply';
    const sumHtml = a.summary ? `<p class="card-summary">${esc(a.summary)}</p>` : '';
    const dateDisp = a.published
      ? a.published.slice(0, 16)
      : (a.fetched_at || '').slice(0, 16);
    const riskHtml = a.watchlist_risk
      ? `<span class="risk-badge ${a.watchlist_risk === '紅' ? 'risk-red' : 'risk-yellow'}">${a.watchlist_risk === '紅' ? '🔴' : '🟡'} ${esc(a.watchlist_vendor)}</span>`
      : '';

    html += `
    <a class="news-card" href="${esc(a.source_url)}" target="_blank" rel="noopener noreferrer">
      <div class="card-header">
        <span class="source-badge ${srcCls}">${esc(a.source)}</span>
        <span class="cat-tag ${catCls}">${esc(a.category)}</span>
        ${riskHtml}
      </div>
      <h3 class="card-title">${esc(a.title)}</h3>
      ${sumHtml}
      <div class="card-footer">
        <span class="card-date">${esc(dateDisp)}</span>
        <span class="card-link">閱讀全文 →</span>
      </div>
    </a>`;
  }

  grid.innerHTML = html;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Pagination ─────────────────────────────────────────────
function renderPagination(total, page, perPage) {
  const pages = Math.ceil(total / perPage);
  const wrap  = document.getElementById('pagination');
  if (pages <= 1) { wrap.innerHTML = ''; return; }
  let h = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  const rng = [];
  for (let i = Math.max(1,page-2); i <= Math.min(pages,page+2); i++) rng.push(i);
  if (rng[0]>1) { h+=`<button class="page-btn" onclick="goPage(1)">1</button>`; if(rng[0]>2)h+=`<span style="color:var(--text-muted);padding:0 .25rem">…</span>`; }
  rng.forEach(p => { h+=`<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`; });
  if (rng.at(-1)<pages) { if(rng.at(-1)<pages-1)h+=`<span style="color:var(--text-muted);padding:0 .25rem">…</span>`; h+=`<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`; }
  h+=`<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
  wrap.innerHTML = h;
}
function goPage(p) { state.page=p; loadNews(); window.scrollTo({top:0,behavior:'smooth'}); }

// ── Category tabs (multi-select) ──────────────────────────
document.getElementById('categoryTabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  const cat = btn.dataset.cat;
  const hint = document.getElementById('multiHint');

  if (cat === '全部') {
    state.categories = [];
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    hint.style.display = 'none';
  } else {
    // Toggle this category
    const idx = state.categories.indexOf(cat);
    if (idx >= 0) {
      state.categories.splice(idx, 1);
      btn.classList.remove('active');
    } else {
      state.categories.push(cat);
      btn.classList.add('active');
    }
    // Update "全部" tab active state
    const allBtn = document.querySelector('.tab[data-cat="全部"]');
    if (state.categories.length === 0) {
      allBtn.classList.add('active');
      hint.style.display = 'none';
    } else {
      allBtn.classList.remove('active');
      hint.style.display = state.categories.length > 1 ? 'block' : 'none';
    }
  }
  state.page = 1;
  loadNews();
});

// ── Date filter ────────────────────────────────────────────
document.querySelectorAll('.date-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.date-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    state.dateFilter = pill.dataset.date;
    state.page = 1;
    loadNews();
  });
});

// ── Source filter ──────────────────────────────────────────
document.getElementById('sourceFilters').addEventListener('click', e => {
  const btn = e.target.closest('.source-pill');
  if (!btn) return;
  document.querySelectorAll('.source-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  state.source = btn.dataset.source;
  state.page = 1;
  loadNews();
});

// ── Desktop search ─────────────────────────────────────────
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.q = e.target.value.trim(); state.page = 1; loadNews(); }, 380);
});

// ── Refresh ────────────────────────────────────────────────
async function triggerRefresh() {
  const btn=document.getElementById('refreshBtn'), icon=document.getElementById('refreshIcon');
  btn.classList.add('loading');
  icon.innerHTML='<span class="spinner"></span>';
  try {
    await fetch('/api/refresh', { method:'POST' });
    showToast('🔄 正在更新科技新聞…');
    await pollUntilDone();
    showToast('✅ 更新完成！');
    loadNews(); loadStats();
  } catch { showToast('❌ 更新失敗'); }
  finally { btn.classList.remove('loading'); icon.textContent='↻'; }
}
async function pollUntilDone() {
  for (let i=0;i<60;i++) {
    await new Promise(r=>setTimeout(r,2000));
    const d = await (await fetch('/api/news?page=1')).json();
    if (!d.loading) return;
  }
}


// ── Toast ──────────────────────────────────────────────────
let toastT;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'), 3500);
}

// ── Auto-refresh & init ────────────────────────────────────
setInterval(()=>{ loadNews(); loadStats(); }, 15*60*1000);
loadNews(); loadStats();

// Poll until data arrives (handles Render cold-start)
const poller = setInterval(async()=>{
  try {
    const d=await(await fetch('/api/stats')).json();
    if(d.total>0){ clearInterval(poller); loadNews(); loadStats(); }
  } catch {}
}, 3000);

</script>
</body>
</html>
