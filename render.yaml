services:
  - type: web
    name: asustimes
    env: python
    pythonVersion: "3.10"
    # 固定 1 worker + 4 thread：避免兩個 worker 同時跑 background loop（Telegram polling
    # Conflict、CSV 寫入 race、外部 API 被打 2x）。thread 共享記憶體，足以服務並發 HTTP。
    startCommand: "gunicorn --workers 1 --threads 4 --timeout 180 app:app"

    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
