name: Daily Commodity Price Update

on:
  schedule:
    # Run at 7 AM, 11 AM, 3 PM, 7 PM Taiwan time (UTC+8)
    # Which is: 11 PM prev day, 3 AM, 7 AM, 11 AM UTC
    - cron: '0 23 * * *'    # 7 AM Taiwan
    - cron: '0 3 * * *'     # 11 AM Taiwan
    - cron: '0 7 * * *'     # 3 PM Taiwan
    - cron: '0 11 * * *'    # 7 PM Taiwan
  workflow_dispatch:

jobs:
  update-commodities:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update commodity prices
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'EOF'
          import sys
          sys.path.insert(0, '.')

          from app import _load_commodity_csv_to_cache, _refresh_live_prices, _save_commodity_csv
          import logging

          logging.basicConfig(level=logging.INFO)
          logger = logging.getLogger(__name__)

          try:
              logger.info("[GITHUB ACTIONS] Loading commodity cache...")
              _load_commodity_csv_to_cache()

              logger.info("[GITHUB ACTIONS] Refreshing live prices...")
              _refresh_live_prices()

              logger.info("[GITHUB ACTIONS] ✅ Commodity prices updated successfully")
          except Exception as e:
              logger.error(f"[GITHUB ACTIONS] ❌ Failed to update commodities: {e}")
              sys.exit(1)
          EOF

      - name: Commit and push updates
        run: |
          git config user.name "ASUSTIMES Bot"
          git config user.email "bot@asustimes.local"

          # Check if there are changes
          if git diff --quiet "2026 Raw material trend history.csv"; then
            echo "No changes to commit"
            exit 0
          fi

          git add "2026 Raw material trend history.csv"
          git commit -m "Update: Daily commodity price refresh ($(date +'%Y-%m-%d %H:%M'))"
          git push origin master
        continue-on-error: true
