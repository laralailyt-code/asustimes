name: Digitimes Daily News Scraper

on:
  schedule:
    # 台湾时间 8:00 AM (UTC 0:00)
    - cron: '0 0 * * *'
    # 台湾时间 12:30 PM (UTC 4:30)
    - cron: '30 4 * * *'
    # 台湾时间 4:30 PM (UTC 8:30)
    - cron: '30 8 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  scrape-digitimes:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: 🔄 Run Digitimes scraper
        run: |
          python3 fetch_digitimes_daily.py
        continue-on-error: true

      - name: 📝 Check for changes
        id: check_changes
        run: |
          if [ -f "digitimes_daily.json" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ New articles found"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠️ No new articles"
          fi

      - name: 🔧 Configure Git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Digitimes Daily Bot"

      - name: 📤 Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add digitimes_daily.json
          git commit -m "Auto: Daily Digitimes news update - $(date +'%Y-%m-%d %H:%M')"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Scrape complete
        run: |
          echo "Scraping completed at $(date)"
          if [ -f "digitimes_daily.json" ]; then
            wc -l digitimes_daily.json
          fi
